version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - elknet
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 30

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: logstash
    user: root
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./logstash/pipeline/:/usr/share/logstash/pipeline/:ro
      - ./logstash/pipelines.yml:/usr/share/logstash/config/pipelines.yml:ro
      - ./logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./logstash/avg_query.json:/usr/share/logstash/config/avg_query.json:ro
      - ./logstash/dedup_query.json:/usr/share/logstash/config/dedup_query.json:ro
      - ./data:/app/output
    ports:
      - "5044:5044"
      - "9600:9600"
    networks:
      - elknet
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9600 | grep -q '\"status\"'"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: on-failure
    environment:
      - ELASTICSEARCH_HOSTS=["http://elasticsearch:9200"]
      - XPACK_SECURITY_ENABLED=false
      - XPACK_FLEET_ENABLED=false
      - XPACK_ENROLLMENT_ENABLED=false
    ports:
      - "5601:5601"
    networks:
      - elknet

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.12.0
    container_name: filebeat
    user: root
    command: filebeat -e -strict.perms=false
    depends_on:
      logstash:
        condition: service_healthy
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - app-logs:/app/logs:ro
    networks:
      - elknet

  go-csv-app:
    build: .
    container_name: go-csv-app
    depends_on:
      elasticsearch:
        condition: service_healthy
      logstash:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - app-logs:/app/logs
    networks:
      - elknet
    restart: unless-stopped

volumes:
  esdata:
  app-logs:
  output-data:

networks:
  elknet:
    name: elknet
    driver: bridge
input {
  heartbeat {
    interval => 20
    message  => "trigger_export"
  }
}

filter {
  # Periodic aggregation query using template
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "csv-logs"
    query_template => "/usr/share/logstash/config/dedup_query.json"
    aggregation_fields => {
      "unique_names" => "unique_names"
      "global_avg_age_18" => "global_avg"
    }
  }

  ruby {
    code => '
      # Extract results
      unique_names = event.get("[unique_names][buckets]")
      global_avg_val = event.get("[global_avg][avg_level][value]")
      
      if unique_names && !unique_names.empty?
        records = unique_names.map { |b| b["latest_record"]["hits"]["hits"][0]["_source"] }
        
        # Consistent global AVG as requested
        final_avg = global_avg_val.nil? || global_avg_val.to_s == "NaN" ? 0.0 : global_avg_val.to_f
        
        # 10 Columns: id, name, age, level, status, calculate, time_generate, acceptation, avg, convert_level
        fields = ["id", "name", "age", "level", "status", "calculate", "time_generate", "acceptation", "avg", "convert_level"]
        header_vals = ["id", "name", "age", "level", "status", "calculate", "time_generate", "Acceptation", "AVG", "convert_level"]
        
        csv_text = header_vals.join(",") + "\n"
        
        records.each do |data|
          # Override row avg with the global avg at export time
          data["avg"] = final_avg
          
          row = fields.map do |f| 
            val = data[f]
            if val.nil?
              ""
            elsif val.is_a?(Numeric)
              sprintf("%.4f", val.to_f).sub(/\.?0+$/, "")
            else
              val.to_s
            end
          end.join(",")
          csv_text += row + "\n"
        end
        
        begin
          File.write("/app/output/output.csv", csv_text)
          puts "[Export Pipeline] Wrote deduplicated CSV with Global AVG: #{final_avg}"
        rescue => e
          puts "[Export Pipeline] Error: #{e.message}"
        end
      end
    '
  }
}

output {
  stdout {
    codec => rubydebug
  }
}

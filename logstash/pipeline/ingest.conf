input {
  # Accept any 10-column CSV from the Go API (via Filebeat)
  beats {
    port => 5044
  }
}

filter {
  # Parse the dynamic JSON message from Go API
  json {
    source => "message"
  }

  # Convert core fields to proper types for logic
  mutate {
    convert => {
      "id" => "integer"
      "age" => "integer"
      "level" => "integer"
    }
  }

  # Step 1: Filter active users > 18 with level > 3
  ruby {
    code => '
      age = event.get("age")
      level = event.get("level")
      status = event.get("status")

      if age.nil? || level.nil? || status.nil? || age.to_i <= 18 || level.to_i <= 3 || status.to_s.strip != "active"
        event.cancel
        return
      end
    '
  }

  # Step 2: Fetch global aggregates for Acceptation and AVG
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "csv-logs"
    query_template => "/usr/share/logstash/config/avg_query.json"
    aggregation_fields => {
      "sum_calc" => "sum_calc"
      "sum_level" => "sum_level"
      "avg_age_18" => "avg_age_18"
    }
  }

  # Step 3: Performance calculations
  ruby {
    code => '
      age = event.get("age").to_f
      level = event.get("level").to_f

      # calculate = (age + level * 3) / 2
      calculate = (age + level * 3.0) / 2.0
      event.set("calculate", calculate.round(4))
      
      # convert_level
      if level <= 5
        event.set("convert_level", "LOW")
      else
        event.set("convert_level", "HIGH")
      end

      # Acceptation: (Sum_calculate * 4 / Sum_level) * 0.1
      s_calc = event.get("[sum_calc][value]").to_f
      s_level = event.get("[sum_level][value]").to_f
      
      total_calc = s_calc + calculate
      total_level = s_level + level
      
      if total_level > 0
        acceptation = (total_calc * 4.0 / total_level) * 0.1
        event.set("acceptation", acceptation.round(4))
      else
        event.set("acceptation", 0.0)
      end
      
      # AVG level (age > 18)
      avg_val = event.get("[avg_age_18][avg_level][value]")
      if !avg_val.nil? && avg_val.to_s != "NaN"
        event.set("avg", avg_val.to_f.round(4))
      else
        # Fallback if first event
        event.set("avg", level.round(4))
      end
    '
  }

  # Clean up metadata
  mutate {
    remove_field => ["message", "@timestamp", "@version", "ecs", "host", "agent", "log", "input", "tags", "event", "sum_calc", "sum_level", "avg_age_18"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "csv-logs"
  }

  stdout {
    codec => rubydebug
  }
}

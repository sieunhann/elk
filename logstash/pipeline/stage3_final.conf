input {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "input-to-sec"
    schedule => "*/5 * * * * *"
  }
  
  # Heartbeat specifically for the periodic CSV export logic
  heartbeat {
    interval => 20
    message  => "trigger_export"
  }
}

filter {
  if [message] == "trigger_export" {
    # 1. Periodic Export Logic
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "final-output"
      query_template => "/usr/share/logstash/config/dedup_query.json"
      aggregation_fields => {
        "unique_names" => "unique_names"
        "global_avg_age_18" => "global_avg"
      }
    }

    ruby {
      code => '
        unique_names = event.get("[unique_names][buckets]")
        global_avg_val = event.get("[global_avg][avg_level][value]")
        
        if unique_names && !unique_names.empty?
          records = unique_names.map { |b| b["latest_record"]["hits"]["hits"][0]["_source"] }
          final_avg = global_avg_val.nil? || global_avg_val.to_s == "NaN" ? 0.0 : global_avg_val.to_f
          
          fields = ["id", "name", "age", "level", "status", "calculate", "time_generate", "acceptation", "avg", "convert_level"]
          header_vals = ["id", "name", "age", "level", "status", "calculate", "time_generate", "Acceptation", "AVG", "convert_level"]
          csv_text = header_vals.join(",") + "\n"
          
          records.each do |data|
            data["avg"] = final_avg
            row = fields.map do |f| 
              val = data[f]
              if val.nil?
                ""
              elsif val.is_a?(Numeric)
                sprintf("%.4f", val.to_f).sub(/\.?0+$/, "")
              else
                val.to_s
              end
            end.join(",")
            csv_text += row + "\n"
          end
          
          begin
            File.write("/app/output/output.csv", csv_text)
            puts "[SNAPSHOT 3 - Stage 3] Exported final CSV with #{records.size} deduplicated records. Global AVG: #{final_avg}"
          rescue => e
            puts "[Export Error] #{e.message}"
          end
        end
        event.cancel # Do not index heartbeat trigger
      '
    }
  } else {
    # 2. Main processing logic for events from input-to-sec
    mutate {
      convert => {
        "id" => "integer"
        "age" => "integer"
        "level" => "integer"
      }
    }

    # Internal Filter
    ruby {
      code => '
        age = event.get("age")
        level = event.get("level")
        status = event.get("status")
        if age.nil? || level.nil? || status.nil? || age.to_i <= 18 || level.to_i <= 3 || status.to_s.strip != "active"
          event.cancel
          return
        end
      '
    }

    # Calculate internal metrics per row
    ruby {
      code => '
        age = event.get("age").to_f
        level = event.get("level").to_f
        
        # calculate = (age + level * 3) / 2
        calc = (age + level * 3.0) / 2.0
        event.set("calculate", calc.round(4))
        
        # Acceptation = (calculate * 4 / level) * 0.1 (Per row logic)
        if level > 0
          acc = (calc * 4.0 / level) * 0.1
          event.set("acceptation", acc.round(4))
        else
          event.set("acceptation", 0.0)
        end
      '
    }
    
    # Final Snapshot 3 (Individual Event)
    ruby {
      code => 'puts "[SNAPSHOT 3 - Stage 3] Final record processed: Name=#{event.get("name")}, Calc=#{event.get("calculate")}, Acc=#{event.get("acceptation")}"'
    }
  }
}

output {
  if [message] != "trigger_export" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "final-output"
    }
  }
}
